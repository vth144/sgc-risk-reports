  const tStrict = [s.headline, s.category].join(" ").toLowerCase(); // chỉ headline+category, không summary
  const m = [];
  if (/logistics|giao hàng|vận chuyển|kho|last.mile/.test(t)) m.push("logistics");
  if (/nhu cầu|tiêu dùng|hành vi|online|mua sắm|thị phần|demand|bán lẻ|doanh thu/.test(t)) m.push("demand");
  if (/nguồn cung|nhà cung cấp|supply|tồn kho|khan hiếm|thiếu hàng/.test(t)) m.push("supply");
  if (/nghị định|chính sách|quy định|pháp lý|thuế|chính phủ|policy|luật/.test(t)) m.push("policy");
  if (/dịch|bệnh|asf|thiên tai|lũ|bão|hạn hán|khí hậu|thời tiết|mưa|dông|áp thấp/.test(tStrict)) m.push("natural_disaster");
  if (!m.length) m.push("demand");
  return m;
}
function getDominantRisk(s) { return classifyRisks(s).reduce((b,id) => SEV_ORDER[RISK_TYPES[id].severity] > SEV_ORDER[RISK_TYPES[b].severity] ? id : b); }
function calcESS(s) { const sc=s.scores||{}; return Math.round(((sc.revenue||1)*0.35+(sc.cost||1)*0.35+(sc.scope||1)*0.15+(sc.duration||1)*0.15)*20*10)/10; }
const RISK_BASE = { logistics:{base:76,min:76,max:100}, demand:{base:51,min:51,max:75}, supply:{base:26,min:26,max:50}, policy:{base:1,min:1,max:25}, natural_disaster:{base:76,min:76,max:100} };
function calcRiskScore(s) { const ess=calcESS(s),cfg=RISK_BASE[getDominantRisk(s)]; return Math.round(Math.min(cfg.max,Math.max(cfg.min,cfg.base+ess*0.24))*10)/10; }
function getRiskLevel(score) {
  if (score>=76) return {level:"NGHIÊM TRỌNG",color:"#7f0000",bg:"rgba(127,0,0,0.08)",border:"rgba(127,0,0,0.2)"};
  if (score>=51) return {level:"CAO",color:"#dc2626",bg:"rgba(220,38,38,0.08)",border:"rgba(220,38,38,0.2)"};
  if (score>=26) return {level:"TRUNG BÌNH",color:"#d97706",bg:"rgba(217,119,6,0.09)",border:"rgba(217,119,6,0.2)"};
  return {level:"THẤP",color:"#16a34a",bg:"rgba(22,163,74,0.08)",border:"rgba(22,163,74,0.18)"};
}
function calcRRI(signals) {
  const total=signals.reduce((sum,s)=>sum+calcRiskScore(s),0);
  if (!total) return {index:0,level:getRiskLevel(0)};
  const crit=signals.filter(s=>calcRiskScore(s)>=76).reduce((sum,s)=>sum+calcRiskScore(s),0);
  return {index:Math.round((crit/total)*100*10)/10,level:getRiskLevel(Math.round((crit/total)*100*10)/10)};
}
const DIR_META = {negative:{icon:"↓",color:"#dc2626"},positive:{icon:"↑",color:"#16a34a"},neutral:{icon:"→",color:"#8d99ae"}};
function renderSources(s,cssClass) {
  const srcs=s.sources||(s.source?[{name:s.source,url:s.source_url||null}]:[]);
  return srcs.map(src=>src.url?`<a class="${cssClass}-link" href="${src.url}" target="_blank" rel="noopener">${src.name} ↗</a>`:`<span class="${cssClass}">${src.name}</span>`).join('<span style="color:rgba(0,0,0,0.25);margin:0 3px">·</span>');
}
const IMPACT_STYLE = {
  negative:{color:"#e63946",bg:"rgba(230,57,70,0.07)",border:"rgba(230,57,70,0.18)",icon:"↓"},
  positive:{color:"#2a9d8f",bg:"rgba(42,157,143,0.07)",border:"rgba(42,157,143,0.18)",icon:"↑"},
  neutral:{color:"#8d99ae",bg:"rgba(141,153,174,0.07)",border:"rgba(141,153,174,0.15)",icon:"→"}
};
let selectedId = SIGNALS[0].id;
function init() {
  document.getElementById('header-date').textContent = META.date + '  ·  Cập nhật lúc ' + META.scanned_at;
  const n = META.signals_count||SIGNALS.length;
  const label = SIGNALS.length===0 ? (META.no_signal_note||"Không có tín hiệu rủi ro đáng kể") : `Top ${n} tín hiệu quan trọng nhất hôm nay`;
  document.getElementById('exec-sub').innerHTML = `<span class="exec-sub-main">${label}</span><span class="exec-sub-note">Phân tích chi tiết hiển thị đầy đủ bên dưới</span>`;
  renderRRI(); renderList(); renderDeep(selectedId);
}
function renderRRI() {
  const rri=calcRRI(SIGNALS);
  document.getElementById('rri-score').textContent=rri.index.toFixed(1);
  document.getElementById('rri-pill').textContent=rri.level.level;
  document.getElementById('rri-box').style.background=rri.level.color;
}
function buildDeepHTML(s) {
  const d=DEEP[s.id]; if(!d) return '';
  const rs=calcRiskScore(s),rl=getRiskLevel(rs);
  return `<div class="deep-panel mobile-inline-deep">
    <div class="deep-id">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <span class="mobile-signal-rank" style="color:${rl.color}">#${s.rank}</span>
        <span style="font-size:11px;color:rgba(0,0,0,0.62);font-weight:600">${s.icon} ${s.category_short}</span>
        <span class="severity-pill" style="background:${rl.color};margin-left:auto">${rl.level}</span>
      </div>
      <div class="deep-headline">${s.headline}</div>
      <div class="deep-meta"><span>${renderSources(s,"deep-source")}</span></div>
    </div>
    <div class="deep-body">
      <div style="padding-top:16px">
        <div class="section-title-row"><div class="section-bar" style="background:#d4af37"></div><span class="section-title" style="color:#b8860b">THÔNG TIN CHI TIẾT</span></div>
        <div class="detail-paragraphs">${d.detail.map(p=>`<p class="detail-para">${p}</p>`).join('')}</div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="section-title-row"><div class="section-bar" style="background:#f4a261"></div><span class="section-title" style="color:#e07b30">TÁC ĐỘNG ĐẾN SAIGON CO.OP</span></div>
        <div class="impact-items">${d.impact.map(item=>{const st=IMPACT_STYLE[item.dir];return `<div class="impact-item" style="background:${st.bg};border:1px solid ${st.border};border-left:3px solid ${st.color}"><div class="impact-area-row"><span class="impact-icon" style="color:${st.color}">${st.icon}</span><span class="impact-area" style="color:${st.color}">${item.area.toUpperCase()}</span></div><p class="impact-text">${item.text}</p></div>`;}).join('')}</div>
      </div>
    </div>
  </div>`;
}
function renderList() {
  const list=document.getElementById('signal-list');
  const rowsHTML=SIGNALS.map(s=>{
    const rs=calcRiskScore(s),rl=getRiskLevel(rs),d=DIR_META[s.direction];
    return `<div class="signal-row" data-id="${s.id}" style="border-left-color:${rl.color}">
      <div class="row-top"><span class="row-rank" style="color:${rl.color}">#${s.rank}</span><span class="row-cat">${s.icon} ${s.category_short}</span><span class="severity-pill" style="background:${rl.color}">${rl.level}</span></div>
      <div class="row-headline">${s.headline}</div>
      <div class="row-summary">${s.summary}</div>
      <div class="row-footer"><span class="row-metric" style="color:${d.color}">${d.icon} ${s.key_metric}</span><span>${renderSources(s,"row-source")}</span></div>
    </div>`;
  }).join('');
  const mobileDeepHTML=`<div class="mobile-deep-section"><div class="mobile-deep-header">PHÂN TÍCH CHI TIẾT</div>${SIGNALS.map(s=>buildDeepHTML(s)).join('')}</div>`;
  list.innerHTML=rowsHTML+mobileDeepHTML;
}
function renderDeep(id) {
  const s=SIGNALS.find(x=>x.id===id),d=DEEP[id]; if(!s||!d) return;
  const rs=calcRiskScore(s),rl=getRiskLevel(rs);
  document.getElementById('deep-panel-container').innerHTML=`<div class="deep-panel">
    <div class="deep-id">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:800;color:${rl.color}">#${s.rank}</span>
        <span class="deep-category" style="margin-bottom:0">${s.icon} ${s.category}</span>
        <span class="severity-pill" style="background:${rl.color};margin-left:auto">${rl.level}</span>
      </div>
      <div class="deep-headline">${s.headline}</div>
      <div class="deep-meta"><span>${renderSources(s,"deep-source")}</span></div>
    </div>
    <div class="deep-body">
      <div style="padding-top:20px">
        <div class="section-title-row"><div class="section-bar" style="background:#d4af37"></div><span class="section-title" style="color:#b8860b">THÔNG TIN CHI TIẾT</span></div>
        <div class="detail-paragraphs">${d.detail.map(p=>`<p class="detail-para">${p}</p>`).join('')}</div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="section-title-row"><div class="section-bar" style="background:#f4a261"></div><span class="section-title" style="color:#e07b30">TÁC ĐỘNG ĐẾN SAIGON CO.OP</span></div>
        <div class="impact-items">${d.impact.map(item=>{const st=IMPACT_STYLE[item.dir];return `<div class="impact-item" style="background:${st.bg};border:1px solid ${st.border};border-left:3px solid ${st.color}"><div class="impact-area-row"><span class="impact-icon" style="color:${st.color}">${st.icon}</span><span class="impact-area" style="color:${st.color}">${item.area.toUpperCase()}</span></div><p class="impact-text">${item.text}</p></div>`;}).join('')}</div>
      </div>
    </div>
  </div>`;
}
init();
</script>
